name: "[Deploy] Grafana Dashboards"

on:
  workflow_dispatch:
    inputs:
      grafana_org_id:
        description: "Grafana Org ID"
        required: false
        default: "2"

jobs:
  deploy_grafana_dashboards:
    name: Deploy Grafana Dashboards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Prometheus datasource UID
        id: prometheus
        run: |
          UID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}" \
            -H "X-Grafana-Org-Id: ${{ inputs.grafana_org_id }}" \
            "${{ secrets.GRAFANA_URL }}/api/datasources/name/Prometheus" \
            | grep -o '"uid":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "uid=$UID" >> $GITHUB_OUTPUT
          echo "Resolved Prometheus UID: $UID"

      - name: Push Grafana dashboards
        run: |
          for file in grafana/production-dashboards/*.json; do
            echo "Pushing $file..."
            dashboard=$(sed "s/\"uid\": \"prometheus\"/\"uid\": \"${{ steps.prometheus.outputs.uid }}\"/g" "$file")
            payload=$(printf '{"dashboard":%s,"overwrite":true,"folderId":0}' "$dashboard")
            response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${{ secrets.GRAFANA_URL }}/api/dashboards/db" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}" \
              -H "X-Grafana-Org-Id: ${{ inputs.grafana_org_id }}" \
              -d "$payload")
            echo "  Response ($response): $(cat /tmp/response.json)"
            if [ "$response" != "200" ] && [ "$response" != "412" ]; then
              echo "ERROR: Failed to push $file"
              exit 1
            fi
          done
          echo "All dashboards pushed successfully."



