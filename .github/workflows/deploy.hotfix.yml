          SEMVER: ${{ needs.set-release-version.outputs.version }}
        run: |
          VERSION=${SEMVER:-"0.0.0"}
          if [ "$VERSION" == "none" ]; then
            VERSION="0.0.0"
          fi
          docker buildx build . --build-arg ELASTIC_HOST --build-arg CI_BUILD_NUMBER=$VERSION --build-arg GIT_HASH=${{ github.sha }} --network=host -f src/AssociationRegistry.Scheduled.Host/Dockerfile \
          --tag ${{ secrets.BUILD_DOCKER_REGISTRY_IK4 }}/verenigingsregister-scheduledhost:$VERSION

      - name: Show images
        shell: bash
        run: docker images

      - name: Save Image
        if: needs.set-release-version.outputs.version != 'none'
        shell: bash
        run: docker image save ${{secrets.BUILD_DOCKER_REGISTRY_IK4}}/verenigingsregister-scheduledhost:${{ needs.set-release-version.outputs.version }} -o ~/ar-scheduled-host-image.tar
        env:
          BUILD_DOCKER_REGISTRY: ${{ secrets.BUILD_DOCKER_REGISTRY_IK4 }}
          SEMVER: ${{ needs.set-release-version.outputs.version }}

      - name: Upload artifact
        if: needs.set-release-version.outputs.version != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: verenigingsregister-scheduledhost
          path: ~/ar-scheduled-host-image.tar


  run-address-sync-tests:
    name: Address Sync
    uses: ./.github/workflows/shared.run-tests.yml
    if: github.repository_owner == 'Informatievlaanderen'
    with:
      test-project: AssociationRegistry.Test.Admin.AddressSync
      run-docker-acm: false
      run-docker-wiremock: false
      run-docker-db: true
      run-docker-elasticsearch: false
      run-docker-ministack: false
      run-docker-otelcollector: true
      pre-gen-marten: false
    secrets: inherit

  build-admin-address-sync:
    name: Build Admin Address Sync
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Informatievlaanderen'
