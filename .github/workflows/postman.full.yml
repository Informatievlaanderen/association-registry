name: "[POSTMAN] Full Regression Suite"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'
    - cron: '0 4 * * 3'

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Run API tests
        run: |
          postman collection run "34061079-b9019512-c4b9-4844-9e86-e70fc8d65a4a" -e "24467383-b7b1ecfe-ae6d-4ded-a378-db554a2bc155" \
            -r html,json \
            --reporter-html-export test-report-full.html \
            --reporter-json-export test-results.json

      - name: Generate failures-only HTML report
        if: always()
        run: |
          pip install beautifulsoup4 -q
          python3 - <<'EOF'
          import os
          from bs4 import BeautifulSoup

          if not os.path.exists("test-report-full.html"):
              print("test-report-full.html not found, skipping")
              exit(0)

          with open("test-report-full.html", encoding="utf-8") as f:
              soup = BeautifulSoup(f.read(), "html.parser")

          for btn in soup.find_all("button", class_="tab-button"):
              if "All Requests" in btn.get_text():
                  btn.decompose()

          for div in soup.find_all("div", class_="tab-content"):
              if "tab-summary" not in div.get("class", []):
                  div.decompose()

          with open("test-report-only-failure-detail.html", "w", encoding="utf-8") as f:
              f.write(str(soup))

          print("Written test-report-only-failure-detail.html (All Requests tab removed)")
          EOF

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-test-reports
          path: |
            test-report-full.html
            test-report-only-failure-detail.html
            test-results.json
            postman-cli-reports/
          retention-days: 30

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            MESSAGE="✅ *API tests succeeded* on \`${{ github.workflow }}\` in repo \`${{ github.repository }}\`.\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          else
            MESSAGE="❌ *API tests failed* on \`${{ github.workflow }}\` in repo \`${{ github.repository }}\`.\n<@U03P611N5TK>,<@koenmetsu> please check the logs: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$MESSAGE\"}" \
          $SLACK_WEBHOOK_URL
