services:

  acm:
    image: ghcr.io/informatievlaanderen/identity-server-fake:1284967
    container_name: vr_acm
    volumes:
      - ./identityserver:/home/identityserver
    ports:
      - "5051:80"
    networks:
      - vr-net

  ministack:
    image: ministackorg/ministack:latest
    container_name: vr_ministack
    environment:
      MINISTACK_REGION: eu-west-1
      MINISTACK_ACCOUNT_ID: 123456789012
      MINISTACK_HOST: 127.0.0.1
    ports:
      - 4566:4566
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health').read()" ]
      interval: 5s
      retries: 12
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vr-net

  ministack-init:
    image: amazon/aws-cli:latest
    container_name: vr_ministack_init
    depends_on:
      ministack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test # pragma: allowlist secret
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://ministack:4566
    volumes:
      - ./.localstack/init/ready.d:/init-scripts:ro
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "sh /init-scripts/01_sqs-init.sh && sh /init-scripts/02_s3-init.sh" ]
    networks:
      - vr-net
    restart: "no"

  seq:
    image: datalust/seq:2025.2
    container_name: vr_seq
    restart: always
    ports:
      - "9580:80"
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_NOAUTHENTICATION: True
    volumes:
      - seq-data:/data
    networks:
      - vr-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.1
    container_name: vr_elasticsearch
    env_file:
      - .env
      - path: .env.local
        required: false
    ports:
      - "9200:9200"
    environment:
      ELASTIC_PASSWORD: local_development
      discovery.type: single-node
      xpack.security.transport.ssl.enabled: false
      xpack.security.http.ssl.enabled: false # Disable HTTP SSL for easier local dev
      cluster.routing.allocation.disk.watermark.low: 97%
      cluster.routing.allocation.disk.watermark.high: 98%
      cluster.routing.allocation.disk.watermark.flood_stage: 99%
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -u elastic:local_development http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=10s || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vr-net

  db:
    image: postgres:15.18
    container_name: vr_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      # you can drop PGOPTIONS here, and move lock_timeout into the command flags
      # override the entrypoint to pass in both max_connections and lock_timeout
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U root -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres -c max_connections=200
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      #- ./scripts/multipledb:/docker-entrypoint-initdb.d
    networks:
      - vr-net

  wiremock:
    image: wiremock/wiremock:3.12.1-1
    container_name: vr_wiremock
    ports:
      - 8080:8080
    command:
      - -verbose
      - -global-response-templating
    volumes:
      - ./wiremock:/home/wiremock

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.132.0
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
    networks:
      - vr-net


  # golden master template creation - Step 1: Run Grate with local scripts (schema only, no production migrations)
  admin-api-migrations-golden-master-local:
    build:
      context: migrations/local/
      dockerfile: Dockerfile
      args:
        CI_BUILD_NUMBER: "8.2.3"
        GIT_HASH: "local-dev"
    container_name: vr_admin_api_migrations_golden_master_local
    environment:
      - APP_CONNSTRING_HOST=db
      - APP_CONNSTRING_DB=golden_master_template
      - APP_CONNSTRING_PORT=5432
      - APP_CONNSTRING_USERNAME=root
      - APP_CONNSTRING_PASSWORD=root
      - DATABASE_TYPE=postgresql
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vr-net

  # Step 2: Seed test data using C# and Marten
  admin-api-seed-testdata:
    build:
      context: .
      dockerfile: tools/SeedTestData/Dockerfile
    container_name: vr_admin_api_seed_testdata
    environment:
      - ConnectionString=Host=db;Port=5432;Database=golden_master_template;Username=root;Password=root
    depends_on:
      admin-api-migrations-golden-master-local:
        condition: service_completed_successfully
    networks:
      - vr-net

  # Step 3: Run Grate with production scripts (including persoonsgegevens split)
  admin-api-migrations-golden-master-production:
    build:
      context: migrations/production/admin.api/
      dockerfile: Dockerfile
      args:
        CI_BUILD_NUMBER: "8.2.3"
        GIT_HASH: "local-dev"
    container_name: vr_admin_api_migrations_golden_master_production
    environment:
      - APP_CONNSTRING_HOST=db
      - APP_CONNSTRING_DB=golden_master_template
      - APP_CONNSTRING_PORT=5432
      - APP_CONNSTRING_USERNAME=root
      - APP_CONNSTRING_PASSWORD=root
      - DATABASE_TYPE=postgresql
    depends_on:
      admin-api-seed-testdata:
        condition: service_completed_successfully
    networks:
      - vr-net

  admin-projections-migrations-golden-master:
    build:
      context: migrations/production/admin.projections/
      dockerfile: Dockerfile
      args:
        CI_BUILD_NUMBER: "8.2.3"
        GIT_HASH: "local-dev"
    container_name: vr_admin_projections_migrations-golden-master
    environment:
      - APP_CONNSTRING_HOST=db
      - APP_CONNSTRING_DB=golden_master_template
      - APP_CONNSTRING_PORT=5432
      - APP_CONNSTRING_USERNAME=root
      - APP_CONNSTRING_PASSWORD=root
      - DATABASE_TYPE=postgresql
    depends_on:
      admin-api-migrations-golden-master-production:
        condition: service_completed_successfully
    networks:
      - vr-net

  #  public-api-migrations-golden-master:
  #    build:
  #      context: migrations/production/public.api/
  #      dockerfile: Dockerfile
  #      args:
  #        CI_BUILD_NUMBER: "8.2.3"
  #        GIT_HASH: "local-dev"
  #    container_name: vr_public_api_migrations-golden-master
  #    environment:
  #      - APP_CONNSTRING_HOST=db
  #      - APP_CONNSTRING_DB=golden_master_template
  #      - APP_CONNSTRING_PORT=5432
  #      - APP_CONNSTRING_USERNAME=root
  #      - APP_CONNSTRING_PASSWORD=root
  #      - DATABASE_TYPE=postgresql
  #    depends_on:
  #      admin-api-migrations-golden-master:
  #        condition: service_completed_successfully
  #    networks:
  #      - vr-net

  public-projections-migrations-golden-master:
    build:
      context: migrations/production/public.projections/
      dockerfile: Dockerfile
      args:
        CI_BUILD_NUMBER: "8.2.3"
        GIT_HASH: "local-dev"
    container_name: vr_public_projections_migrations-golden-master
    environment:
      - APP_CONNSTRING_HOST=db
      - APP_CONNSTRING_DB=golden_master_template
      - APP_CONNSTRING_PORT=5432
      - APP_CONNSTRING_USERNAME=root
      - APP_CONNSTRING_PASSWORD=root
      - DATABASE_TYPE=postgresql
    depends_on:
      admin-api-migrations-golden-master-production:
        condition: service_completed_successfully
    networks:
      - vr-net

  acm-api-migrations-golden-master:
    build:
      context: migrations/production/acm.api/
      dockerfile: Dockerfile
      args:
        CI_BUILD_NUMBER: "8.2.3"
        GIT_HASH: "local-dev"
    container_name: vr_acm_api_migrations-golden-master
    environment:
      - APP_CONNSTRING_HOST=db
      - APP_CONNSTRING_DB=golden_master_template
      - APP_CONNSTRING_PORT=5432
      - APP_CONNSTRING_USERNAME=root
      - APP_CONNSTRING_PASSWORD=root
      - DATABASE_TYPE=postgresql
    depends_on:
      admin-api-migrations-golden-master-production:
        condition: service_completed_successfully
    networks:
      - vr-net

  # Create the verenigingsregister database from the golden master template
  create-verenigingsregister-db:
    image: postgres:15.18
    container_name: vr_create_verenigingsregister_db
    environment:
      - PGPASSWORD=root
    command: >
      sh -c "
        echo 'Creating verenigingsregister database from golden master template...' &&
        psql -h db -U root -d postgres -c 'DROP DATABASE IF EXISTS verenigingsregister WITH (FORCE);' &&
        psql -h db -U root -d postgres -c 'CREATE DATABASE verenigingsregister WITH TEMPLATE golden_master_template;' &&
        echo 'Successfully created verenigingsregister database from template'
      "
    depends_on:
      acm-api-migrations-golden-master:
        condition: service_completed_successfully
      admin-api-migrations-golden-master-production:
        condition: service_completed_successfully
      admin-projections-migrations-golden-master:
        condition: service_completed_successfully
      public-projections-migrations-golden-master:
        condition: service_completed_successfully
    networks:
      - vr-net

volumes:
  pg-data:
  e2e-data:
  es-data:
  seq-data:
  localstack-data:
  lambda-artifacts:


networks:
  vr-net:
